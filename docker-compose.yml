version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: pharmazen_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: pharmazen_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pharmazen_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pharmazen.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"

volumes:
  postgres_data:
